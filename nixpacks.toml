[phases.setup]
nixPkgs = [
  "nodejs_20",
  "python311",
  "python311Packages.pip",
  "python311Packages.numpy",
  "python311Packages.pandas",
  "python311Packages.uvicorn",
  "python311Packages.fastapi"
]

[phases.install]
cmds = [
  "cd frontend && npm install",
  "pip install --break-system-packages python-dotenv openpyxl xlrd google-genai aiofiles python-multipart pydantic"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "bash -c 'cd /app/backend && python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT'"
